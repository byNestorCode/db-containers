services:
  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - '${PHPMYADMIN_PORT}:80'
    env_file: .env
    depends_on:
      - db

  db:
    image: mysql:latest
    ports:
      - '${MYSQL_PORT}:3306'
    restart: always
    env_file: .env
    volumes:
      - ./mysql_data:/var/lib/mysql

volumes:
  mysql_data: